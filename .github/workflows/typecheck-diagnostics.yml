name: Typecheck Diagnostics

on:
  pull_request:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install --frozen-lockfile=false
      - name: Concise typecheck
        shell: bash
        run: set -o pipefail; pnpm typecheck 2>&1 | tail -n 100
