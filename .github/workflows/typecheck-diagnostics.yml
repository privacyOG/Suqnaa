name: Typecheck Diagnostics

on:
  pull_request:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Concise typecheck
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@9.12.0 --activate
          pnpm install --frozen-lockfile=false >/dev/null
          set -o pipefail
          pnpm typecheck 2>&1 | tail -n 60
