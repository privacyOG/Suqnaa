name: Preflight

on:
  push:
    branches:
      - 'preflight/**'
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: preflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  start:
    name: Start diagnostic preflight
    runs-on: ubuntu-latest
    steps:
      - name: Publish pending statuses
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          publish() {
            payload=$(printf '{"state":"pending","description":"%s","context":"%s"}' "$2" "$1")
            curl --fail-with-body --silent --show-error \
              --request POST \
              --header "Accept: application/vnd.github+json" \
              --header "Authorization: Bearer $GH_TOKEN" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
              --data "$payload"
          }
          publish "preflight/gate" "Diagnostic preflight is running"
          publish "preflight/db" "Database migrations are pending"
          publish "preflight/node-install" "Node dependencies are pending"
          publish "preflight/typecheck" "TypeScript checks are pending"
          publish "preflight/api-tests" "API tests are pending"
          publish "preflight/web-tests" "Web tests are pending"
          publish "preflight/mobile-pub" "Mobile dependencies are pending"
          publish "preflight/mobile-gen" "Mobile localization generation is pending"
          publish "preflight/mobile-analyze" "Mobile analysis is pending"
          publish "preflight/mobile-tests" "Mobile tests are pending"

  database:
    name: Database migration diagnostic
    needs: start
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: suqnaa
          POSTGRES_PASSWORD: suqnaa_dev_password
          POSTGRES_DB: suqnaa
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U suqnaa -d suqnaa"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://suqnaa:suqnaa_dev_password@localhost:5432/suqnaa
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - id: migrations
        name: Apply database migrations
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          for migration in infra/db/migrations/*.sql; do
            echo "Applying $migration"
            psql "$DATABASE_URL" --set ON_ERROR_STOP=1 --file "$migration"
          done
      - name: Publish database result
        if: always()
        env:
          RESULT: ${{ steps.migrations.outcome }}
        shell: bash
        run: |
          if [[ "$RESULT" == "success" ]]; then state=success; description="Database migrations passed"; else state=failure; description="Database migrations failed"; fi
          payload=$(printf '{"state":"%s","description":"%s","context":"preflight/db"}' "$state" "$description")
          curl --fail-with-body --silent --show-error --request POST --header "Accept: application/vnd.github+json" --header "Authorization: Bearer $GH_TOKEN" --header "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" --data "$payload"
          [[ "$state" == "success" ]]

  web-and-api:
    name: Web and API diagnostic
    needs: start
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      API_HOST: 0.0.0.0
      API_PORT: 4000
      WEB_ORIGIN: http://localhost:3000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
      API_BASE_URL: http://localhost:4000
      DATABASE_URL: postgres://suqnaa:suqnaa_dev_password@localhost:5432/suqnaa
      JWT_ACCESS_SECRET: ci-access-secret-change-in-production-32chars
      JWT_REFRESH_SECRET: ci-refresh-secret-change-in-production-32chars
      PASSWORD_PEPPER: ci-password-pepper-change-in-production-32chars
      CHALLENGE_PROVIDER: none
      ASSISTANT_ENABLED: false
      ASSISTANT_PROVIDER: none
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - id: install
        name: Install Node dependencies
        continue-on-error: true
        run: pnpm install --frozen-lockfile=false
      - id: typecheck
        name: Run TypeScript checks
        if: always()
        continue-on-error: true
        run: pnpm typecheck
      - id: api
        name: Run API tests
        if: always()
        continue-on-error: true
        run: pnpm --dir apps/api test:security
      - id: web
        name: Run web tests
        if: always()
        continue-on-error: true
        run: pnpm --dir apps/web test:session
      - name: Publish web and API results
        if: always()
        env:
          INSTALL_RESULT: ${{ steps.install.outcome }}
          TYPECHECK_RESULT: ${{ steps.typecheck.outcome }}
          API_RESULT: ${{ steps.api.outcome }}
          WEB_RESULT: ${{ steps.web.outcome }}
        shell: bash
        run: |
          publish() {
            local context="$1"
            local result="$2"
            local passed="$3"
            local failed="$4"
            if [[ "$result" == "success" ]]; then state=success; description="$passed"; else state=failure; description="$failed"; fi
            payload=$(printf '{"state":"%s","description":"%s","context":"%s"}' "$state" "$description" "$context")
            curl --fail-with-body --silent --show-error --request POST --header "Accept: application/vnd.github+json" --header "Authorization: Bearer $GH_TOKEN" --header "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" --data "$payload"
          }
          publish "preflight/node-install" "$INSTALL_RESULT" "Node dependencies resolved" "Node dependency resolution failed"
          publish "preflight/typecheck" "$TYPECHECK_RESULT" "TypeScript checks passed" "TypeScript checks failed"
          publish "preflight/api-tests" "$API_RESULT" "API tests passed" "API tests failed"
          publish "preflight/web-tests" "$WEB_RESULT" "Web tests passed" "Web tests failed"
          [[ "$INSTALL_RESULT" == "success" && "$TYPECHECK_RESULT" == "success" && "$API_RESULT" == "success" && "$WEB_RESULT" == "success" ]]

  mobile:
    name: Mobile diagnostic
    needs: start
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - id: pub
        name: Resolve mobile dependencies
        working-directory: apps/mobile
        continue-on-error: true
        run: flutter pub get
      - id: gen
        name: Generate mobile localizations
        working-directory: apps/mobile
        if: always()
        continue-on-error: true
        run: flutter gen-l10n
      - id: analyze
        name: Analyze mobile application
        working-directory: apps/mobile
        if: always()
        continue-on-error: true
        run: flutter analyze
      - id: tests
        name: Test mobile application
        working-directory: apps/mobile
        if: always()
        continue-on-error: true
        run: flutter test
      - name: Publish mobile results
        if: always()
        env:
          PUB_RESULT: ${{ steps.pub.outcome }}
          GEN_RESULT: ${{ steps.gen.outcome }}
          ANALYZE_RESULT: ${{ steps.analyze.outcome }}
          TEST_RESULT: ${{ steps.tests.outcome }}
        shell: bash
        run: |
          publish() {
            local context="$1"
            local result="$2"
            local passed="$3"
            local failed="$4"
            if [[ "$result" == "success" ]]; then state=success; description="$passed"; else state=failure; description="$failed"; fi
            payload=$(printf '{"state":"%s","description":"%s","context":"%s"}' "$state" "$description" "$context")
            curl --fail-with-body --silent --show-error --request POST --header "Accept: application/vnd.github+json" --header "Authorization: Bearer $GH_TOKEN" --header "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" --data "$payload"
          }
          publish "preflight/mobile-pub" "$PUB_RESULT" "Mobile dependencies resolved" "Mobile dependency resolution failed"
          publish "preflight/mobile-gen" "$GEN_RESULT" "Mobile localization generation passed" "Mobile localization generation failed"
          publish "preflight/mobile-analyze" "$ANALYZE_RESULT" "Mobile analysis passed" "Mobile analysis failed"
          publish "preflight/mobile-tests" "$TEST_RESULT" "Mobile tests passed" "Mobile tests failed"
          [[ "$PUB_RESULT" == "success" && "$GEN_RESULT" == "success" && "$ANALYZE_RESULT" == "success" && "$TEST_RESULT" == "success" ]]

  report:
    name: Publish diagnostic preflight result
    if: always()
    needs:
      - database
      - web-and-api
      - mobile
    runs-on: ubuntu-latest
    steps:
      - name: Publish final status
        env:
          GH_TOKEN: ${{ github.token }}
          DATABASE_RESULT: ${{ needs.database.result }}
          WEB_RESULT: ${{ needs.web-and-api.result }}
          MOBILE_RESULT: ${{ needs.mobile.result }}
        shell: bash
        run: |
          if [[ "$DATABASE_RESULT" == "success" && "$WEB_RESULT" == "success" && "$MOBILE_RESULT" == "success" ]]; then
            state=success
            description="All diagnostic preflight checks passed"
          else
            state=failure
            description="Diagnostic preflight checks failed"
          fi
          payload=$(printf '{"state":"%s","description":"%s","context":"preflight/gate"}' "$state" "$description")
          curl --fail-with-body --silent --show-error --request POST --header "Accept: application/vnd.github+json" --header "Authorization: Bearer $GH_TOKEN" --header "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" --data "$payload"
          [[ "$state" == "success" ]]
