name: Preflight

on:
  push:
    branches:
      - 'preflight/**'
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: preflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  start:
    name: Start preflight gate
    runs-on: ubuntu-latest
    steps:
      - name: Publish pending status
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          payload='{"state":"pending","description":"Preflight checks are running","context":"preflight/gate"}'
          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            --data "$payload"

  web-and-api:
    name: Web and API preflight
    needs: start
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      API_HOST: 0.0.0.0
      API_PORT: 4000
      WEB_ORIGIN: http://localhost:3000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
      API_BASE_URL: http://localhost:4000
      DATABASE_URL: postgres://suqnaa:suqnaa_dev_password@localhost:5432/suqnaa
      JWT_ACCESS_SECRET: ci-access-secret-change-in-production-32chars
      JWT_REFRESH_SECRET: ci-refresh-secret-change-in-production-32chars
      PASSWORD_PEPPER: ci-password-pepper-change-in-production-32chars
      CHALLENGE_PROVIDER: none
      ASSISTANT_ENABLED: false
      ASSISTANT_PROVIDER: none
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm typecheck
      - run: pnpm --dir apps/api test:security
      - run: pnpm --dir apps/web test:session
      - name: Publish web and API result
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          RESULT: ${{ job.status }}
        shell: bash
        run: |
          payload=$(printf '{"state":"%s","description":"Web and API preflight %s","context":"preflight/web-api"}' "$RESULT" "$RESULT")
          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            --data "$payload"

  mobile:
    name: Mobile preflight
    needs: start
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - working-directory: apps/mobile
        run: flutter pub get
      - working-directory: apps/mobile
        run: flutter gen-l10n
      - name: Run Flutter analysis
        id: analysis
        continue-on-error: true
        working-directory: apps/mobile
        shell: bash
        run: |
          set -o pipefail
          flutter analyze 2>&1 | tee mobile-analysis.log
      - name: Run Flutter tests
        id: tests
        if: steps.analysis.outcome == 'success'
        continue-on-error: true
        working-directory: apps/mobile
        shell: bash
        run: |
          set -o pipefail
          flutter test 2>&1 | tee mobile-tests.log
      - name: Publish mobile diagnostic
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          ANALYSIS_RESULT: ${{ steps.analysis.outcome }}
          TEST_RESULT: ${{ steps.tests.outcome }}
        working-directory: apps/mobile
        shell: bash
        run: |
          state="success"
          description="Mobile preflight passed"
          context="preflight/mobile-success"

          if [[ "$ANALYSIS_RESULT" != "success" ]]; then
            state="failure"
            detail=$(grep -E 'error •|warning •|info •|issue found|issues found' mobile-analysis.log | head -1 || true)
            description="analysis: ${detail:-failed}"
            slug=$(printf '%s' "${detail:-failed}" | sed -E 's/[^A-Za-z0-9._-]+/-/g' | cut -c1-170)
            context="preflight/mobile-analysis-${slug}"
          elif [[ "$TEST_RESULT" != "success" ]]; then
            state="failure"
            detail=$(grep -E 'Expected:|Actual:|Test failed|Some tests failed|EXCEPTION CAUGHT|Bad state:|The finder' mobile-tests.log | head -1 || true)
            description="tests: ${detail:-failed}"
            slug=$(printf '%s' "${detail:-failed}" | sed -E 's/[^A-Za-z0-9._-]+/-/g' | cut -c1-170)
            context="preflight/mobile-tests-${slug}"
          fi

          export STATUS_STATE="$state"
          export STATUS_DESCRIPTION="${description:0:130}"
          export STATUS_CONTEXT="$context"
          payload=$(python3 - <<'PY'
          import json
          import os
          print(json.dumps({
              "state": os.environ["STATUS_STATE"],
              "description": os.environ["STATUS_DESCRIPTION"],
              "context": os.environ["STATUS_CONTEXT"],
          }))
          PY
          )

          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            --data "$payload"

          [[ "$state" == "success" ]]

  report:
    name: Publish preflight result
    if: always()
    needs:
      - web-and-api
      - mobile
    runs-on: ubuntu-latest
    steps:
      - name: Publish final status
        env:
          GH_TOKEN: ${{ github.token }}
          WEB_RESULT: ${{ needs.web-and-api.result }}
          MOBILE_RESULT: ${{ needs.mobile.result }}
        shell: bash
        run: |
          if [[ "$WEB_RESULT" == "success" && "$MOBILE_RESULT" == "success" ]]; then
            state="success"
            description="All preflight checks passed"
          else
            state="failure"
            description="Preflight checks failed"
          fi

          payload=$(printf '{"state":"%s","description":"%s","context":"preflight/gate"}' "$state" "$description")
          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            --data "$payload"

          [[ "$state" == "success" ]]
