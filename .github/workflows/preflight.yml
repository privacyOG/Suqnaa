name: Preflight

on:
  push:
    branches:
      - 'preflight/**'
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: preflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  response-case-diagnostics:
    name: Diagnose catalogue response cases
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - working-directory: apps/mobile
        run: flutter pub get && flutter gen-l10n
      - name: Publish pending statuses
        shell: bash
        run: |
          publish() {
            payload=$(printf '{"state":"pending","description":"%s","context":"%s"}' "$2" "$1")
            curl --fail-with-body --silent --show-error --request POST --header "Accept: application/vnd.github+json" --header "Authorization: Bearer $GH_TOKEN" --header "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" --data "$payload"
          }
          publish preflight/gate "Private response diagnostics are running"
          publish preflight/api-cross-media "Cross-listing media case pending"
          publish preflight/api-pagination "Pagination contradiction case pending"
      - name: Run response cases
        working-directory: apps/mobile
        shell: bash
        run: |
          publish() {
            payload=$(printf '{"state":"%s","description":"%s","context":"%s"}' "$2" "$3" "$1")
            curl --fail-with-body --silent --show-error --request POST --header "Accept: application/vnd.github+json" --header "Authorization: Bearer $GH_TOKEN" --header "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" --data "$payload"
          }
          if flutter test test/catalog_api_test.dart --plain-name "rejects cross-listing media paths"; then
            publish preflight/api-cross-media success "Cross-listing media case passed"
          else
            publish preflight/api-cross-media failure "Cross-listing media case failed"
          fi
          if flutter test test/catalog_api_test.dart --plain-name "rejects contradictory pagination"; then
            publish preflight/api-pagination success "Pagination contradiction case passed"
          else
            publish preflight/api-pagination failure "Pagination contradiction case failed"
          fi
      - name: Keep diagnostic gate closed
        if: always()
        shell: bash
        run: |
          payload='{"state":"failure","description":"Private diagnostic run only","context":"preflight/gate"}'
          curl --fail-with-body --silent --show-error --request POST --header "Accept: application/vnd.github+json" --header "Authorization: Bearer $GH_TOKEN" --header "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" --data "$payload"
