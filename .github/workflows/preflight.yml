name: Preflight

on:
  push:
    branches:
      - 'preflight/**'
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: preflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  catalogue-test-cases:
    name: Diagnose catalogue test cases
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - working-directory: apps/mobile
        run: flutter pub get && flutter gen-l10n
      - name: Publish pending statuses
        shell: bash
        run: |
          publish() {
            payload=$(printf '{"state":"pending","description":"%s","context":"%s"}' "$2" "$1")
            curl --fail-with-body --silent --show-error --request POST --header "Accept: application/vnd.github+json" --header "Authorization: Bearer $GH_TOKEN" --header "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" --data "$payload"
          }
          publish preflight/gate "Private test-case diagnostics are running"
          publish preflight/api-complete "Complete query case pending"
          publish preflight/api-default-sort "Default sort case pending"
          publish preflight/api-invalid-options "Invalid option cases pending"
          publish preflight/api-invalid-response "Invalid response cases pending"
          publish preflight/api-categories "Category case pending"
          publish preflight/api-error "Error case pending"
          publish preflight/widget-en "English widget case pending"
          publish preflight/widget-ar "Arabic widget case pending"
          publish preflight/widget-currency "Currency widget case pending"
      - name: Run test cases
        working-directory: apps/mobile
        shell: bash
        run: |
          publish() {
            payload=$(printf '{"state":"%s","description":"%s","context":"%s"}' "$2" "$3" "$1")
            curl --fail-with-body --silent --show-error --request POST --header "Accept: application/vnd.github+json" --header "Authorization: Bearer $GH_TOKEN" --header "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" --data "$payload"
          }
          run_case() {
            context="$1"
            file="$2"
            name="$3"
            if flutter test "$file" --plain-name "$name"; then
              publish "$context" success "$name passed"
            else
              publish "$context" failure "$name failed"
            fi
          }
          run_case preflight/api-complete test/catalog_api_test.dart "catalog search serializes complete filters and resolves media URLs"
          run_case preflight/api-default-sort test/catalog_api_test.dart "newest search omits the default sort parameter"
          run_case preflight/api-invalid-options test/catalog_api_test.dart "rejects invalid search option combinations before transport"
          run_case preflight/api-invalid-response test/catalog_api_test.dart "rejects cross-listing media paths and contradictory pagination"
          run_case preflight/api-categories test/catalog_api_test.dart "catalog categories retain bilingual names"
          run_case preflight/api-error test/catalog_api_test.dart "catalog errors expose status and retry interval"
          run_case preflight/widget-en test/catalog_filter_sheet_test.dart "renders complete English catalogue filters"
          run_case preflight/widget-ar test/catalog_filter_sheet_test.dart "renders complete Arabic catalogue filters"
          run_case preflight/widget-currency test/catalog_filter_sheet_test.dart "requires currency for price sorting"
      - name: Keep diagnostic gate closed
        if: always()
        shell: bash
        run: |
          payload='{"state":"failure","description":"Private diagnostic run only","context":"preflight/gate"}'
          curl --fail-with-body --silent --show-error --request POST --header "Accept: application/vnd.github+json" --header "Authorization: Bearer $GH_TOKEN" --header "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" --data "$payload"
