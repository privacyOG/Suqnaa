name: Preflight

on:
  push:
    branches:
      - 'preflight/**'
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: preflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  response-runtime-diagnostics:
    name: Diagnose catalogue response runtime
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - working-directory: apps/mobile
        run: flutter pub get
      - name: Create runtime diagnostic
        working-directory: apps/mobile
        shell: bash
        run: |
          mkdir -p tool
          cat > tool/catalog_response_diagnostic.dart <<'DART'
          import 'dart:convert';
          import 'package:http/http.dart' as http;
          import 'package:http/testing.dart';
          import 'package:suqnaa/src/api/catalog_api.dart';

          const listingId = '123e4567-e89b-42d3-a456-426614174000';
          const mediaId = '223e4567-e89b-42d3-a456-426614174000';
          const sellerId = '323e4567-e89b-42d3-a456-426614174000';
          const categoryId = '423e4567-e89b-42d3-a456-426614174000';

          Map<String, dynamic> listingPayload(String mediaListingId) => {
            'id': listingId,
            'title': 'Mirrorless camera',
            'description': 'Camera body in excellent condition.',
            'priceAmount': '899.50',
            'currencyCode': 'AUD',
            'condition': 'like_new',
            'availabilityStatus': 'in_stock',
            'availableQuantity': 1,
            'unitLabel': 'item',
            'countryCode': 'AU',
            'region': 'NSW',
            'city': 'Sydney',
            'suburb': 'Greenacre',
            'allowPickup': true,
            'allowDelivery': true,
            'media': [{
              'id': mediaId,
              'url': '/v1/listings/$mediaListingId/media/$mediaId',
              'mimeType': 'image/jpeg',
              'altText': 'Camera',
            }],
            'mediaCount': 1,
            'category': {
              'id': categoryId,
              'slug': 'electronics',
              'nameEn': 'Electronics',
              'nameAr': 'Electronics Arabic',
            },
            'seller': {
              'id': sellerId,
              'displayName': 'Seller',
              'status': 'active',
            },
          };

          Future<String> capture(Map<String, dynamic> payload) async {
            final api = CatalogApi(
              baseUrl: Uri.parse('https://api.suqnaa.test'),
              client: MockClient((_) async => http.Response(jsonEncode(payload), 200)),
            );
            try {
              await api.search(const CatalogSearchOptions());
              return 'no-error';
            } catch (error) {
              return '${error.runtimeType}:${error.toString()}';
            }
          }

          Future<void> main() async {
            final cross = await capture({
              'listings': [
                listingPayload('523e4567-e89b-42d3-a456-426614174000'),
              ],
              'pagination': {'hasMore': false, 'nextCursor': null},
            });
            final pagination = await capture({
              'listings': [listingPayload(listingId)],
              'pagination': {'hasMore': true, 'nextCursor': null},
            });
            print('cross=$cross | page=$pagination');
          }
          DART
      - name: Publish runtime exception
        working-directory: apps/mobile
        shell: bash
        run: |
          result=$(dart run tool/catalog_response_diagnostic.dart | tail -n 1 | cut -c1-120)
          payload=$(jq -n --arg state failure --arg description "$result" --arg context "preflight/api-response-runtime" '{state:$state,description:$description,context:$context}')
          curl --fail-with-body --silent --show-error --request POST --header "Accept: application/vnd.github+json" --header "Authorization: Bearer $GH_TOKEN" --header "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" --data "$payload"
          gate='{"state":"failure","description":"Private diagnostic run only","context":"preflight/gate"}'
          curl --fail-with-body --silent --show-error --request POST --header "Accept: application/vnd.github+json" --header "Authorization: Bearer $GH_TOKEN" --header "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" --data "$gate"
