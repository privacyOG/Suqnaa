name: Preflight

on:
  push:
    branches:
      - 'preflight/**'
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: preflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  start:
    name: Start preflight gate
    runs-on: ubuntu-latest
    steps:
      - name: Publish pending statuses
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          publish() {
            local context="$1"
            local description="$2"
            payload=$(printf '{"state":"pending","description":"%s","context":"%s"}' "$description" "$context")
            curl --fail-with-body --silent --show-error \
              --request POST \
              --header "Accept: application/vnd.github+json" \
              --header "Authorization: Bearer $GH_TOKEN" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
              --data "$payload"
          }
          publish "preflight/gate" "Preflight checks are running"
          publish "preflight/db" "Database migrations are pending"
          publish "preflight/typecheck" "TypeScript checks are pending"
          publish "preflight/api-tests" "API tests are pending"
          publish "preflight/web-tests" "Web tests are pending"
          publish "preflight/mobile-pub" "Mobile dependencies are pending"
          publish "preflight/mobile-analyze" "Mobile analysis is pending"
          publish "preflight/mobile-tests" "Mobile tests are pending"

  web-and-api:
    name: Web and API preflight
    needs: start
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: suqnaa
          POSTGRES_PASSWORD: suqnaa_dev_password
          POSTGRES_DB: suqnaa
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U suqnaa -d suqnaa"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      API_HOST: 0.0.0.0
      API_PORT: 4000
      WEB_ORIGIN: http://localhost:3000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
      API_BASE_URL: http://localhost:4000
      DATABASE_URL: postgres://suqnaa:suqnaa_dev_password@localhost:5432/suqnaa
      JWT_ACCESS_SECRET: ci-access-secret-change-in-production-32chars
      JWT_REFRESH_SECRET: ci-refresh-secret-change-in-production-32chars
      PASSWORD_PEPPER: ci-password-pepper-change-in-production-32chars
      CHALLENGE_PROVIDER: none
      ASSISTANT_ENABLED: false
      ASSISTANT_PROVIDER: none
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - name: Apply database migrations
        shell: bash
        run: |
          set -euo pipefail
          publish() {
            payload=$(printf '{"state":"%s","description":"%s","context":"preflight/db"}' "$1" "$2")
            curl --fail-with-body --silent --show-error --request POST --header "Accept: application/vnd.github+json" --header "Authorization: Bearer $GH_TOKEN" --header "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" --data "$payload"
          }
          if for migration in infra/db/migrations/*.sql; do psql "$DATABASE_URL" --set ON_ERROR_STOP=1 --file "$migration"; done; then
            publish success "Database migrations passed"
          else
            publish failure "Database migrations failed"
            exit 1
          fi
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install --frozen-lockfile=false
      - name: Run typecheck
        shell: bash
        run: |
          set -o pipefail
          if pnpm typecheck; then state=success; description="TypeScript checks passed"; else state=failure; description="TypeScript checks failed"; fi
          payload=$(printf '{"state":"%s","description":"%s","context":"preflight/typecheck"}' "$state" "$description")
          curl --fail-with-body --silent --show-error --request POST --header "Accept: application/vnd.github+json" --header "Authorization: Bearer $GH_TOKEN" --header "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" --data "$payload"
          [[ "$state" == success ]]
      - name: Run API security tests
        shell: bash
        run: |
          if pnpm --dir apps/api test:security; then state=success; description="API tests passed"; else state=failure; description="API tests failed"; fi
          payload=$(printf '{"state":"%s","description":"%s","context":"preflight/api-tests"}' "$state" "$description")
          curl --fail-with-body --silent --show-error --request POST --header "Accept: application/vnd.github+json" --header "Authorization: Bearer $GH_TOKEN" --header "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" --data "$payload"
          [[ "$state" == success ]]
      - name: Run web session tests
        shell: bash
        run: |
          if pnpm --dir apps/web test:session; then state=success; description="Web tests passed"; else state=failure; description="Web tests failed"; fi
          payload=$(printf '{"state":"%s","description":"%s","context":"preflight/web-tests"}' "$state" "$description")
          curl --fail-with-body --silent --show-error --request POST --header "Accept: application/vnd.github+json" --header "Authorization: Bearer $GH_TOKEN" --header "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" --data "$payload"
          [[ "$state" == success ]]

  mobile:
    name: Mobile preflight
    needs: start
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Resolve mobile dependencies
        working-directory: apps/mobile
        shell: bash
        run: |
          if flutter pub get; then state=success; description="Mobile dependencies resolved"; else state=failure; description="Mobile dependency resolution failed"; fi
          payload=$(printf '{"state":"%s","description":"%s","context":"preflight/mobile-pub"}' "$state" "$description")
          curl --fail-with-body --silent --show-error --request POST --header "Accept: application/vnd.github+json" --header "Authorization: Bearer $GH_TOKEN" --header "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" --data "$payload"
          [[ "$state" == success ]]
      - working-directory: apps/mobile
        run: flutter gen-l10n
      - name: Analyze mobile application
        working-directory: apps/mobile
        shell: bash
        run: |
          if flutter analyze; then state=success; description="Mobile analysis passed"; else state=failure; description="Mobile analysis failed"; fi
          payload=$(printf '{"state":"%s","description":"%s","context":"preflight/mobile-analyze"}' "$state" "$description")
          curl --fail-with-body --silent --show-error --request POST --header "Accept: application/vnd.github+json" --header "Authorization: Bearer $GH_TOKEN" --header "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" --data "$payload"
          [[ "$state" == success ]]
      - name: Test mobile application
        working-directory: apps/mobile
        shell: bash
        run: |
          if flutter test; then state=success; description="Mobile tests passed"; else state=failure; description="Mobile tests failed"; fi
          payload=$(printf '{"state":"%s","description":"%s","context":"preflight/mobile-tests"}' "$state" "$description")
          curl --fail-with-body --silent --show-error --request POST --header "Accept: application/vnd.github+json" --header "Authorization: Bearer $GH_TOKEN" --header "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" --data "$payload"
          [[ "$state" == success ]]

  report:
    name: Publish preflight result
    if: always()
    needs:
      - web-and-api
      - mobile
    runs-on: ubuntu-latest
    steps:
      - name: Publish final status
        env:
          GH_TOKEN: ${{ github.token }}
          WEB_RESULT: ${{ needs.web-and-api.result }}
          MOBILE_RESULT: ${{ needs.mobile.result }}
        shell: bash
        run: |
          if [[ "$WEB_RESULT" == "success" && "$MOBILE_RESULT" == "success" ]]; then
            state="success"
            description="All preflight checks passed"
          else
            state="failure"
            description="Preflight checks failed"
          fi
          payload=$(printf '{"state":"%s","description":"%s","context":"preflight/gate"}' "$state" "$description")
          curl --fail-with-body --silent --show-error --request POST --header "Accept: application/vnd.github+json" --header "Authorization: Bearer $GH_TOKEN" --header "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" --data "$payload"
          [[ "$state" == "success" ]]
