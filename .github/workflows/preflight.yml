name: Preflight

on:
  push:
    branches:
      - 'preflight/**'
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: preflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mobile-test-diagnostics:
    name: Diagnose catalogue mobile tests
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - working-directory: apps/mobile
        run: flutter pub get && flutter gen-l10n
      - name: Publish pending statuses
        shell: bash
        run: |
          publish() {
            payload=$(printf '{"state":"pending","description":"%s","context":"%s"}' "$2" "$1")
            curl --fail-with-body --silent --show-error --request POST --header "Accept: application/vnd.github+json" --header "Authorization: Bearer $GH_TOKEN" --header "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" --data "$payload"
          }
          publish preflight/gate "Private mobile-test diagnostics are running"
          publish preflight/catalog-api-test "Catalogue API test is pending"
          publish preflight/catalog-filter-widget "Filter widget test is pending"
          publish preflight/catalog-filter-surface "Filter surface test is pending"
          publish preflight/mobile-tests "Complete mobile tests are pending"
      - name: Run diagnostic test files
        working-directory: apps/mobile
        shell: bash
        run: |
          publish() {
            payload=$(printf '{"state":"%s","description":"%s","context":"%s"}' "$2" "$3" "$1")
            curl --fail-with-body --silent --show-error --request POST --header "Accept: application/vnd.github+json" --header "Authorization: Bearer $GH_TOKEN" --header "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" --data "$payload"
          }
          run_test() {
            context="$1"
            file="$2"
            if flutter test "$file"; then
              publish "$context" success "$file passed"
            else
              publish "$context" failure "$file failed"
            fi
          }
          run_test preflight/catalog-api-test test/catalog_api_test.dart
          run_test preflight/catalog-filter-widget test/catalog_filter_sheet_test.dart
          run_test preflight/catalog-filter-surface test/catalog_filter_surface_test.dart
          if flutter test; then
            publish preflight/mobile-tests success "Complete mobile tests passed"
          else
            publish preflight/mobile-tests failure "Complete mobile tests failed"
          fi
      - name: Keep diagnostic gate closed
        if: always()
        shell: bash
        run: |
          payload='{"state":"failure","description":"Private diagnostic run only","context":"preflight/gate"}'
          curl --fail-with-body --silent --show-error --request POST --header "Accept: application/vnd.github+json" --header "Authorization: Bearer $GH_TOKEN" --header "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" --data "$payload"
