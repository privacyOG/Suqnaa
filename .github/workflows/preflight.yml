name: Preflight

on:
  push:
    branches:
      - 'preflight/**'
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: preflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  start:
    name: Start preflight gate
    runs-on: ubuntu-latest
    steps:
      - name: Publish pending statuses
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          for context in preflight/gate preflight/db preflight/typecheck preflight/api-tests preflight/web-tests preflight/mobile-analyze preflight/mobile-tests; do
            payload=$(printf '{"state":"pending","description":"Private preflight stage pending","context":"%s"}' "$context")
            curl --fail-with-body --silent --show-error --request POST --header "Accept: application/vnd.github+json" --header "Authorization: Bearer $GH_TOKEN" --header "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" --data "$payload"
          done

  web-and-api:
    name: Web and API preflight
    needs: start
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: suqnaa
          POSTGRES_PASSWORD: suqnaa_dev_password
          POSTGRES_DB: suqnaa
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U suqnaa -d suqnaa"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      API_HOST: 0.0.0.0
      API_PORT: 4000
      WEB_ORIGIN: http://localhost:3000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
      API_BASE_URL: http://localhost:4000
      DATABASE_URL: postgres://suqnaa:suqnaa_dev_password@localhost:5432/suqnaa
      JWT_ACCESS_SECRET: ci-access-secret-change-in-production-32chars
      JWT_REFRESH_SECRET: ci-refresh-secret-change-in-production-32chars
      PASSWORD_PEPPER: ci-password-pepper-change-in-production-32chars
      CHALLENGE_PROVIDER: none
      ASSISTANT_ENABLED: false
      ASSISTANT_PROVIDER: none
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - name: Apply database migrations
        shell: bash
        run: |
          set -euo pipefail
          for migration in infra/db/migrations/*.sql; do
            echo "Applying $migration"
            psql "$DATABASE_URL" --set ON_ERROR_STOP=1 --file "$migration"
          done
      - name: Publish database success
        shell: bash
        run: |
          payload='{"state":"success","description":"Database migrations passed","context":"preflight/db"}'
          curl --fail-with-body --silent --show-error --request POST --header "Accept: application/vnd.github+json" --header "Authorization: Bearer $GH_TOKEN" --header "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" --data "$payload"
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm typecheck
      - name: Publish typecheck success
        shell: bash
        run: |
          payload='{"state":"success","description":"Typecheck passed","context":"preflight/typecheck"}'
          curl --fail-with-body --silent --show-error --request POST --header "Accept: application/vnd.github+json" --header "Authorization: Bearer $GH_TOKEN" --header "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" --data "$payload"
      - run: pnpm --dir apps/api test:security
      - name: Publish API test success
        shell: bash
        run: |
          payload='{"state":"success","description":"API tests passed","context":"preflight/api-tests"}'
          curl --fail-with-body --silent --show-error --request POST --header "Accept: application/vnd.github+json" --header "Authorization: Bearer $GH_TOKEN" --header "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" --data "$payload"
      - run: pnpm --dir apps/web test:session
      - name: Publish web test success
        shell: bash
        run: |
          payload='{"state":"success","description":"Web tests passed","context":"preflight/web-tests"}'
          curl --fail-with-body --silent --show-error --request POST --header "Accept: application/vnd.github+json" --header "Authorization: Bearer $GH_TOKEN" --header "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" --data "$payload"

  mobile:
    name: Mobile preflight
    needs: start
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - working-directory: apps/mobile
        run: flutter pub get
      - working-directory: apps/mobile
        run: flutter gen-l10n
      - working-directory: apps/mobile
        run: flutter analyze
      - name: Publish mobile analysis success
        shell: bash
        run: |
          payload='{"state":"success","description":"Mobile analysis passed","context":"preflight/mobile-analyze"}'
          curl --fail-with-body --silent --show-error --request POST --header "Accept: application/vnd.github+json" --header "Authorization: Bearer $GH_TOKEN" --header "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" --data "$payload"
      - working-directory: apps/mobile
        run: flutter test
      - name: Publish mobile test success
        shell: bash
        run: |
          payload='{"state":"success","description":"Mobile tests passed","context":"preflight/mobile-tests"}'
          curl --fail-with-body --silent --show-error --request POST --header "Accept: application/vnd.github+json" --header "Authorization: Bearer $GH_TOKEN" --header "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" --data "$payload"

  report:
    name: Publish preflight result
    if: always()
    needs:
      - web-and-api
      - mobile
    runs-on: ubuntu-latest
    steps:
      - name: Publish final status
        env:
          GH_TOKEN: ${{ github.token }}
          WEB_RESULT: ${{ needs.web-and-api.result }}
          MOBILE_RESULT: ${{ needs.mobile.result }}
        shell: bash
        run: |
          if [[ "$WEB_RESULT" == "success" && "$MOBILE_RESULT" == "success" ]]; then
            state="success"
            description="All preflight checks passed"
          else
            state="failure"
            description="Preflight checks failed"
          fi
          payload=$(printf '{"state":"%s","description":"%s","context":"preflight/gate"}' "$state" "$description")
          curl --fail-with-body --silent --show-error --request POST --header "Accept: application/vnd.github+json" --header "Authorization: Bearer $GH_TOKEN" --header "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" --data "$payload"
          [[ "$state" == "success" ]]
