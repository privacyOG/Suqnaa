name: Preflight

on:
  push:
    branches:
      - 'preflight/**'
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: preflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  catalogue-api-cases:
    name: Diagnose catalogue API test cases
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - working-directory: apps/mobile
        run: flutter pub get && flutter gen-l10n
      - name: Publish pending statuses
        shell: bash
        run: |
          publish() {
            payload=$(printf '{"state":"pending","description":"%s","context":"%s"}' "$2" "$1")
            curl --fail-with-body --silent --show-error --request POST --header "Accept: application/vnd.github+json" --header "Authorization: Bearer $GH_TOKEN" --header "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" --data "$payload"
          }
          publish preflight/gate "Private catalogue diagnostics are running"
          publish preflight/catalog-complete "Complete query case pending"
          publish preflight/catalog-default "Default sort case pending"
          publish preflight/catalog-options "Invalid options case pending"
          publish preflight/catalog-cross "Cross-listing case pending"
          publish preflight/catalog-pagination "Pagination case pending"
          publish preflight/catalog-categories "Categories case pending"
          publish preflight/catalog-error "Error response case pending"
      - name: Run cases
        working-directory: apps/mobile
        shell: bash
        run: |
          publish() {
            payload=$(printf '{"state":"%s","description":"%s","context":"%s"}' "$2" "$3" "$1")
            curl --fail-with-body --silent --show-error --request POST --header "Accept: application/vnd.github+json" --header "Authorization: Bearer $GH_TOKEN" --header "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" --data "$payload"
          }
          run_case() {
            context="$1"
            name="$2"
            if flutter test test/catalog_api_test.dart --plain-name "$name"; then
              publish "$context" success "$name passed"
            else
              publish "$context" failure "$name failed"
            fi
          }
          run_case preflight/catalog-complete "catalog search serializes complete filters and resolves media URLs"
          run_case preflight/catalog-default "newest search omits the default sort parameter"
          run_case preflight/catalog-options "rejects invalid search option combinations before transport"
          run_case preflight/catalog-cross "rejects cross-listing media paths"
          run_case preflight/catalog-pagination "rejects contradictory pagination"
          run_case preflight/catalog-categories "catalog categories retain bilingual names"
          run_case preflight/catalog-error "catalog errors expose status and retry interval"
      - name: Keep diagnostic gate closed
        if: always()
        shell: bash
        run: |
          payload='{"state":"failure","description":"Private diagnostic run only","context":"preflight/gate"}'
          curl --fail-with-body --silent --show-error --request POST --header "Accept: application/vnd.github+json" --header "Authorization: Bearer $GH_TOKEN" --header "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" --data "$payload"
