name: Preflight

on:
  push:
    branches:
      - 'preflight/**'
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: preflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  start:
    name: Start preflight gate
    runs-on: ubuntu-latest
    steps:
      - name: Publish pending statuses
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          publish() {
            payload=$(printf '{"state":"pending","description":"%s","context":"%s"}' "$2" "$1")
            curl --fail-with-body --silent --show-error --request POST --header "Accept: application/vnd.github+json" --header "Authorization: Bearer $GH_TOKEN" --header "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" --data "$payload"
          }
          publish "preflight/gate" "Preflight checks are running"
          publish "preflight/mobile-manager-native" "Native media manager test is pending"
          publish "preflight/mobile-manager-secure" "Secure media manager test is pending"
          publish "preflight/mobile-manager-arabic" "Arabic media manager test is pending"

  web-and-api:
    name: Web and API preflight
    needs: start
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: suqnaa
          POSTGRES_PASSWORD: suqnaa_dev_password
          POSTGRES_DB: suqnaa
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U suqnaa -d suqnaa"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      API_HOST: 0.0.0.0
      API_PORT: 4000
      WEB_ORIGIN: http://localhost:3000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
      API_BASE_URL: http://localhost:4000
      DATABASE_URL: postgres://suqnaa:suqnaa_dev_password@localhost:5432/suqnaa
      JWT_ACCESS_SECRET: ci-access-secret-change-in-production-32chars
      JWT_REFRESH_SECRET: ci-refresh-secret-change-in-production-32chars
      PASSWORD_PEPPER: ci-password-pepper-change-in-production-32chars
      CHALLENGE_PROVIDER: none
      ASSISTANT_ENABLED: false
      ASSISTANT_PROVIDER: none
    steps:
      - uses: actions/checkout@v4
      - name: Apply database migrations
        shell: bash
        run: |
          set -euo pipefail
          for migration in infra/db/migrations/*.sql; do
            psql "$DATABASE_URL" --set ON_ERROR_STOP=1 --file "$migration"
          done
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm typecheck
      - run: pnpm --dir apps/api test:security
      - run: pnpm --dir apps/web test:session

  mobile:
    name: Mobile preflight
    needs: start
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - working-directory: apps/mobile
        run: flutter pub get
      - working-directory: apps/mobile
        run: flutter gen-l10n
      - working-directory: apps/mobile
        run: flutter analyze
      - name: Test native listing media manager
        working-directory: apps/mobile
        shell: bash
        run: |
          if flutter test test/listing_media_manager_screen_test.dart --plain-name "uploads and deletes one photo when challenges are disabled"; then state=success; else state=failure; fi
          payload=$(printf '{"state":"%s","description":"Native listing media manager test","context":"preflight/mobile-manager-native"}' "$state")
          curl --fail-with-body --silent --show-error --request POST --header "Accept: application/vnd.github+json" --header "Authorization: Bearer $GH_TOKEN" --header "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" --data "$payload"
          [[ "$state" == success ]]
      - name: Test secure listing media manager
        working-directory: apps/mobile
        shell: bash
        run: |
          if flutter test test/listing_media_manager_screen_test.dart --plain-name "uses only secure web handoff when challenges are enabled"; then state=success; else state=failure; fi
          payload=$(printf '{"state":"%s","description":"Secure listing media manager test","context":"preflight/mobile-manager-secure"}' "$state")
          curl --fail-with-body --silent --show-error --request POST --header "Accept: application/vnd.github+json" --header "Authorization: Bearer $GH_TOKEN" --header "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" --data "$payload"
          [[ "$state" == success ]]
      - name: Test Arabic listing media manager
        working-directory: apps/mobile
        shell: bash
        run: |
          if flutter test test/listing_media_manager_screen_test.dart --plain-name "renders the protected manager in Arabic"; then state=success; else state=failure; fi
          payload=$(printf '{"state":"%s","description":"Arabic listing media manager test","context":"preflight/mobile-manager-arabic"}' "$state")
          curl --fail-with-body --silent --show-error --request POST --header "Accept: application/vnd.github+json" --header "Authorization: Bearer $GH_TOKEN" --header "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" --data "$payload"
          [[ "$state" == success ]]
      - working-directory: apps/mobile
        run: flutter test

  report:
    name: Publish preflight result
    if: always()
    needs:
      - web-and-api
      - mobile
    runs-on: ubuntu-latest
    steps:
      - name: Publish final status
        env:
          GH_TOKEN: ${{ github.token }}
          WEB_RESULT: ${{ needs.web-and-api.result }}
          MOBILE_RESULT: ${{ needs.mobile.result }}
        shell: bash
        run: |
          if [[ "$WEB_RESULT" == "success" && "$MOBILE_RESULT" == "success" ]]; then
            state="success"
            description="All preflight checks passed"
          else
            state="failure"
            description="Preflight checks failed"
          fi
          payload=$(printf '{"state":"%s","description":"%s","context":"preflight/gate"}' "$state" "$description")
          curl --fail-with-body --silent --show-error --request POST --header "Accept: application/vnd.github+json" --header "Authorization: Bearer $GH_TOKEN" --header "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" --data "$payload"
          [[ "$state" == success ]]
