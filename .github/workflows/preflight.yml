name: Preflight

on:
  push:
    branches:
      - 'preflight/**'
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: preflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  start:
    name: Start private diagnostics
    runs-on: ubuntu-latest
    steps:
      - name: Publish pending statuses
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          publish() {
            payload=$(printf '{"state":"pending","description":"%s","context":"%s"}' "$2" "$1")
            curl --fail-with-body --silent --show-error --request POST --header "Accept: application/vnd.github+json" --header "Authorization: Bearer $GH_TOKEN" --header "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" --data "$payload"
          }
          publish preflight/gate "Private diagnostics are running"
          publish preflight/db "Database migrations pending"
          publish preflight/typecheck "TypeScript checks pending"
          publish preflight/api-tests "API tests pending"
          publish preflight/web-tests "Web tests pending"
          publish preflight/mobile-pub "Mobile dependencies pending"
          publish preflight/mobile-analyze "Flutter analysis pending"
          publish preflight/catalog-api-test "Catalogue API test pending"
          publish preflight/catalog-filter-widget "Filter widget test pending"
          publish preflight/catalog-filter-surface "Filter surface test pending"
          publish preflight/mobile-tests "Complete mobile tests pending"

  web-and-api:
    name: Diagnose web and API
    needs: start
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: suqnaa
          POSTGRES_PASSWORD: suqnaa_dev_password
          POSTGRES_DB: suqnaa
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U suqnaa -d suqnaa"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      API_HOST: 0.0.0.0
      API_PORT: 4000
      WEB_ORIGIN: http://localhost:3000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
      API_BASE_URL: http://localhost:4000
      DATABASE_URL: postgres://suqnaa:suqnaa_dev_password@localhost:5432/suqnaa
      JWT_ACCESS_SECRET: ci-access-secret-change-in-production-32chars
      JWT_REFRESH_SECRET: ci-refresh-secret-change-in-production-32chars
      PASSWORD_PEPPER: ci-password-pepper-change-in-production-32chars
      CHALLENGE_PROVIDER: none
      ASSISTANT_ENABLED: false
      ASSISTANT_PROVIDER: none
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install --frozen-lockfile=false
      - name: Run stages
        shell: bash
        run: |
          publish() {
            payload=$(printf '{"state":"%s","description":"%s","context":"%s"}' "$2" "$3" "$1")
            curl --fail-with-body --silent --show-error --request POST --header "Accept: application/vnd.github+json" --header "Authorization: Bearer $GH_TOKEN" --header "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" --data "$payload"
          }
          apply_migrations() {
            for migration in infra/db/migrations/*.sql; do
              psql "$DATABASE_URL" --set ON_ERROR_STOP=1 --file "$migration" || return 1
            done
          }
          if apply_migrations; then publish preflight/db success "Database migrations passed"; else publish preflight/db failure "Database migrations failed"; fi
          if pnpm typecheck; then publish preflight/typecheck success "TypeScript checks passed"; else publish preflight/typecheck failure "TypeScript checks failed"; fi
          if pnpm --dir apps/api test:security; then publish preflight/api-tests success "API tests passed"; else publish preflight/api-tests failure "API tests failed"; fi
          if pnpm --dir apps/web test:session; then publish preflight/web-tests success "Web tests passed"; else publish preflight/web-tests failure "Web tests failed"; fi

  mobile:
    name: Diagnose mobile
    needs: start
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Run stages
        working-directory: apps/mobile
        shell: bash
        run: |
          publish() {
            payload=$(printf '{"state":"%s","description":"%s","context":"%s"}' "$2" "$3" "$1")
            curl --fail-with-body --silent --show-error --request POST --header "Accept: application/vnd.github+json" --header "Authorization: Bearer $GH_TOKEN" --header "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" --data "$payload"
          }
          if flutter pub get && flutter gen-l10n; then publish preflight/mobile-pub success "Mobile dependencies passed"; else publish preflight/mobile-pub failure "Mobile dependencies failed"; fi
          if flutter analyze; then publish preflight/mobile-analyze success "Flutter analysis passed"; else publish preflight/mobile-analyze failure "Flutter analysis failed"; fi
          if flutter test test/catalog_api_test.dart; then publish preflight/catalog-api-test success "Catalogue API test passed"; else publish preflight/catalog-api-test failure "Catalogue API test failed"; fi
          if flutter test test/catalog_filter_sheet_test.dart; then publish preflight/catalog-filter-widget success "Filter widget test passed"; else publish preflight/catalog-filter-widget failure "Filter widget test failed"; fi
          if flutter test test/catalog_filter_surface_test.dart; then publish preflight/catalog-filter-surface success "Filter surface test passed"; else publish preflight/catalog-filter-surface failure "Filter surface test failed"; fi
          if flutter test; then publish preflight/mobile-tests success "Complete mobile tests passed"; else publish preflight/mobile-tests failure "Complete mobile tests failed"; fi

  report:
    name: Publish diagnostic result
    if: always()
    needs:
      - web-and-api
      - mobile
    runs-on: ubuntu-latest
    steps:
      - name: Keep diagnostic gate closed
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          payload='{"state":"failure","description":"Private diagnostic run only","context":"preflight/gate"}'
          curl --fail-with-body --silent --show-error --request POST --header "Accept: application/vnd.github+json" --header "Authorization: Bearer $GH_TOKEN" --header "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" --data "$payload"
