name: Mobile CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - working-directory: apps/mobile
        run: flutter pub get
      - working-directory: apps/mobile
        run: flutter gen-l10n
      - working-directory: apps/mobile
        run: flutter analyze
      - name: Run Flutter tests
        working-directory: apps/mobile
        shell: bash
        run: |
          set +e
          flutter test > flutter-test.log 2>&1
          status=$?
          cat flutter-test.log
          exit $status
      - name: Upload Flutter test diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-test-diagnostics
          path: apps/mobile/flutter-test.log
          if-no-files-found: error
          retention-days: 1
